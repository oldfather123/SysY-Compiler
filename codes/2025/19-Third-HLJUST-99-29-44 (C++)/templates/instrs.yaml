# include head files
headers:
  - common/type.hpp
  - common/defines.hpp
  - IR/Function.hpp
  - IR/BasicBlock.hpp

classes:
  - classname: Alloca
    constructor_args:
      - type: Type*
        name: ty
      - type: std::string
        name: name
      - type: unsigned
        name: alignment
      - type: BasicBlock*
        name: bb
    members:
      - type: unsigned
        name: _alignment
        generate_get: true
        #      - type: Type*
        #        name: _type
        #        generate_get: true
        # - type: std::string
        #   name: _name
        #   generate_get: true
    methods:
      - type: std::string 
        name: to_str
      - type: std::string 
        name: to_llvm
      - type: void 
        name: dump

  - classname: Load
    constructor_args:
      - type: Type*
        name: ty
        #      - type: Value*
        #        name: dst
      - type: Value*
        name: src
      - type: std::string
        name: _name
      - type: unsigned
        name: alignment
      - type: BasicBlock*
        name: bb
    members:
      - type: unsigned
        name: _alignment
        generate_get: true
        #     - type: Type*
        #       name: _type
        #       generate_get: true
        #     - type: Value*
        #        name: _dst
        #        generate_get: true
      - type: Value*
        name: _src
        generate_get: true
    methods:
      - type: std::string 
        name: to_str
      - type: std::string 
        name: to_llvm

  - classname: Store
    constructor_args:
      - type: Type* 
        name: ty
      - type: Value*
        name: dst
      - type: Value*
        name: src
      - type: std::string
        name: _name
      - type: unsigned
        name: alignment
      - type: BasicBlock*
        name: bb
    members:
      # - type: Type*
      #   name: _type
      #   generate_get: true
      - type: Value*
        name: _dst
        generate_get: true
      - type: Value*
        name: _src
        generate_get: true
      - type: unsigned
        name: _alignment
        generate_get: true
    methods:
      - type: std::string 
        name: to_str
      - type: std::string 
        name: to_llvm

  - classname: Binary
    constructor_args:
      - type: Type*
        name: ty
      - type: BinaryOp
        name: bop
      - type: Value*
        name: lhs
      - type: Value*
        name: rhs
      - type: std::string
        name: _name
      - type: BinaryInstType
        name: instr_type
      - type: BasicBlock*
        name: bb
    members:
      - type: Type*
        name: _ty
        generate_get: true
      - type: BinaryOp
        name: _bop
        generate_get: true
      - type: Value*
        name: _lhs
        generate_get: true
      - type: Value*
        name: _rhs
        generate_get: true
      - type: BinaryInstType
        name: _instr_type
        generate_get: true
    methods:
      - type: std::string 
        name: to_str
      - type: std::string 
        name: to_llvm


  - classname: Convert
    constructor_args:
      - type: Value*
        name: src
      - type: Type*
        name: src_type
      - type: Type*
        name: dst_type
      - type: std::string
        name: _name
      - type: BasicBlock*
        name: bb
    members:
      - type: Value*
        name: src
        generate_get: true
      - type: Type*
        name: src_type
        generate_get: true
      - type: Type*
        name: dst_type
        generate_get: true
    methods:
      - type: std::string 
        name: to_str
      - type: std::string 
        name: to_llvm

  - classname: Call
    constructor_args:
      - type: const IR::Function*
        name: func
      - type: std::vector<Value*>
        name: args
      - type: std::string
        name: _name
      - type: BasicBlock*
        name: bb
    members:
      - type: const IR::Function*
        name: _func
        generate_get: true
      - type: std::vector<Value*>
        name: _args
        generate_get: true
    methods:
      - type: std::string 
        name: to_str
      - type: std::string 
        name: to_llvm

  - classname: Return
    constructor_args: 
      - type: Value* 
        name: ret_val
      - type: std::string
        name: name
      - type: BasicBlock*
        name: bb
    members:
      - type: Value* 
        name: _ret_val
        generate_get: true
    methods:
      - type: std::string 
        name: to_str
      - type: std::string 
        name: to_llvm

  - classname: GetElementPtr
    constructor_args:
      - type: Type*
        name: arr_type
      - type: Type*
        name: base_type
      - type: std::vector<Value*>
        name: indices
      - type: Value*
        name: src
      - type: std::string
        name: _name
      - type: BasicBlock*
        name: bb
    members:
      - type: Type*
        name: _arr_type
        generate_get: true
      - type: std::vector<Value*>
        name: _indices
        generate_get: true
      - type: Value*
        name: _src
        generate_get: true
    methods:
      - type: std::string 
        name: to_str
      - type: std::string 
        name: to_llvm

  - classname: Phi
    constructor_args:
      - type : Type*
        name : ty
      - type : std::string&
        name : name
      - type : std::vector<BasicBlock*>
        name : candidate_bbs
      - type : std::vector<Value*>
        name : candidate_vars
      - type : BasicBlock*
        name : bb
    members:
      - type : std::vector<BasicBlock*>
        name : _candidate_bbs
        generate_get: true
      - type : std::vector<Value*>
        name : _candidate_vars
        generate_get: true
    methods:
      - type: std::string 
        name: to_str
      - type: std::string 
        name: to_llvm

# the type for branch is usless, just for the base class Instruction
  - classname: CondBranch
    constructor_args:
      - type : Type*
        name : ty
      - type : Value*
        name : cond
      - type : BasicBlock*
        name : cur_bb
      - type : BasicBlock*
        name : true_bb
      - type : BasicBlock*
        name : false_bb
    members:
      - type : Value*
        name : _cond
        generate_get: true
      - type : BasicBlock*
        name : _true_bb
        generate_get: true
      - type : BasicBlock*
        name : _false_bb
        generate_get: true
    methods:
      - type: std::string 
        name: to_str
      - type: std::string 
        name: to_llvm

  - classname: Branch
    constructor_args:
      - type : Type*
        name : ty
      - type : BasicBlock*
        name : cur_bb
      - type : BasicBlock*
        name : dst_bb
    members:
      - type : BasicBlock*
        name : _dst_bb
        generate_get: true
    methods:
      - type: std::string 
        name: to_str
      - type: std::string 
        name: to_llvm
