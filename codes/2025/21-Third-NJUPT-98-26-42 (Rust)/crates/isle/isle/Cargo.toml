[package]
authors = ["The Cranelift Project Developers"]
description = "ISLE: Instruction Selection and Lowering Expressions. A domain-specific language for instruction selection in Cranelift."
edition = "2021"
rust-version = "1.76"
license = "Apache-2.0 WITH LLVM-exception"
name = "cranelift-isle"
readme = "../README.md"
repository = "https://github.com/bytecodealliance/wasmtime/tree/main/cranelift/isle"
version = "0.123.0"

[lints]
workspace = true

[dependencies]
codespan-reporting = { workspace = true, optional = true }
log = { workspace = true, optional = true }

[dev-dependencies]
tempfile = { workspace = true }

[features]
default = []

logging = ["log"]
fancy-errors = ["codespan-reporting"]
